<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Splatter — Apparato Cardio-Circolatorio</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root{
    --rosso-arteria: #c8102e;
    --rosso-scuro: #7a0a1c;
    --blu-vena: #0b3d91;
    --blu-scuro: #071f4d;
    --bianco: #f7f4ef;
    --nero: #0c0c0c;
    --ok: #1a7f3a;
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }

  html, body{
    min-height: 100vh;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 21px;
    line-height: 1.5;
    color: var(--nero);
    background: var(--bianco);
  }

  /* Splatter di sfondo */
  body::before{
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(200,16,46,0.18) 0, rgba(200,16,46,0) 14%),
      radial-gradient(circle at 85% 10%, rgba(11,61,145,0.18) 0, rgba(11,61,145,0) 16%),
      radial-gradient(circle at 78% 82%, rgba(200,16,46,0.15) 0, rgba(200,16,46,0) 18%),
      radial-gradient(circle at 18% 78%, rgba(11,61,145,0.15) 0, rgba(11,61,145,0) 17%),
      radial-gradient(circle at 50% 50%, rgba(122,10,28,0.08) 0, rgba(122,10,28,0) 40%);
  }

  /* Macchie SVG decorative */
  .splat{
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: .55;
  }
  .splat-1{ top: -40px; left: -30px; width: 260px; transform: rotate(-15deg); }
  .splat-2{ top: -20px; right: -40px; width: 220px; transform: rotate(25deg); }
  .splat-3{ bottom: -40px; left: -20px; width: 240px; transform: rotate(200deg); }
  .splat-4{ bottom: -30px; right: -30px; width: 260px; transform: rotate(160deg); }

  main{
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header{
    text-align: center;
    margin-bottom: 32px;
  }

  h1{
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(34px, 5vw, 52px);
    line-height: 1.05;
    letter-spacing: -0.5px;
    text-transform: uppercase;
  }
  h1 .rosso{ color: var(--rosso-arteria); }
  h1 .blu{ color: var(--blu-vena); }

  .sottotitolo{
    margin-top: 10px;
    font-size: 20px;
    color: #333;
  }

  /* CARD principale */
  .card{
    background: #fff;
    border: 3px solid var(--nero);
    box-shadow: 10px 10px 0 var(--rosso-arteria), 10px 10px 0 4px var(--nero);
    padding: 32px 28px;
    position: relative;
  }

  /* Schermata iniziale */
  .start-screen{ text-align: center; }
  .start-screen p{
    font-size: 21px;
    margin-bottom: 28px;
  }

  .bottone{
    display: inline-block;
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 16px 36px;
    border: 3px solid var(--nero);
    background: var(--rosso-arteria);
    color: #fff;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease;
    box-shadow: 6px 6px 0 var(--nero);
  }
  .bottone:hover{ transform: translate(-2px,-2px); box-shadow: 8px 8px 0 var(--nero); }
  .bottone:active{ transform: translate(3px,3px); box-shadow: 3px 3px 0 var(--nero); }

  .bottone.blu{ background: var(--blu-vena); }

  /* Barra progresso */
  .progress-bar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 20px;
    font-weight: 700;
  }
  .progress-bar .punteggio{ color: var(--rosso-arteria); }
  .progress-bar .numero{ color: var(--blu-vena); }

  .progress-track{
    height: 10px;
    background: #eee;
    border: 2px solid var(--nero);
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .progress-fill{
    height: 100%;
    background: linear-gradient(90deg, var(--blu-vena), var(--rosso-arteria));
    width: 0%;
    transition: width .4s ease;
  }

  .domanda{
    font-size: 22px;
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 24px;
    padding: 18px 20px;
    border-left: 6px solid var(--rosso-arteria);
    background: #fafafa;
  }

  .opzioni{
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .opzione{
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 21px;
    line-height: 1.4;
    text-align: left;
    padding: 14px 18px;
    background: #fff;
    border: 3px solid var(--nero);
    cursor: pointer;
    transition: transform .1s ease, background .2s ease, color .2s ease;
    box-shadow: 4px 4px 0 var(--blu-vena);
  }
  .opzione:hover:not(:disabled){
    transform: translate(-2px,-2px);
    box-shadow: 6px 6px 0 var(--blu-vena);
    background: #f0f4ff;
  }
  .opzione:disabled{ cursor: default; }

  .opzione.corretta{
    background: var(--ok);
    color: #fff;
    border-color: var(--nero);
    box-shadow: 4px 4px 0 var(--nero);
    animation: pulse-ok .6s ease;
  }
  .opzione.sbagliata{
    background: var(--rosso-scuro);
    color: #fff;
    border-color: var(--nero);
    box-shadow: 4px 4px 0 var(--nero);
    animation: shake .4s ease;
  }

  @keyframes pulse-ok{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.03); }
    100%{ transform: scale(1); }
  }
  @keyframes shake{
    0%,100%{ transform: translateX(0); }
    25%{ transform: translateX(-6px); }
    75%{ transform: translateX(6px); }
  }

  .feedback{
    margin-top: 22px;
    padding: 18px 20px;
    border: 3px solid var(--nero);
    font-size: 21px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show{ display: block; animation: slide-in .4s ease; }
  .feedback.giusta{ background: #e8f5e9; border-left: 8px solid var(--ok); }
  .feedback.errata{ background: #ffebee; border-left: 8px solid var(--rosso-arteria); }
  .feedback strong{ font-family: 'Archivo Black', sans-serif; display: block; margin-bottom: 6px; font-size: 22px; }

  @keyframes slide-in{
    from{ opacity: 0; transform: translateY(10px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .next-wrapper{
    margin-top: 22px;
    text-align: right;
    display: none;
  }
  .next-wrapper.show{ display: block; }

  /* Schermata finale */
  .finale{ text-align: center; }
  .finale .score-big{
    font-family: 'Archivo Black', sans-serif;
    font-size: 72px;
    color: var(--rosso-arteria);
    line-height: 1;
    margin: 20px 0;
  }
  .finale .msg{
    font-size: 22px;
    margin-bottom: 30px;
  }

  /* Controllo audio */
  .audio-toggle{
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--nero);
    color: #fff;
    border: 3px solid var(--nero);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 3px 3px 0 var(--rosso-arteria);
  }
  .audio-toggle:hover{ background: var(--rosso-arteria); }

  /* Splatter animato su risposta corretta */
  .splatter-burst{
    position: fixed;
    pointer-events: none;
    z-index: 100;
    width: 0;
    height: 0;
  }


  .home-nav {
    display: flex;
    justify-content: center;
    padding: 22px 16px 32px;
    position: relative;
    z-index: 2;
  }

  .home-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: min(360px, 100%);
    min-height: 50px;
    padding: 13px 18px;
    border: 3px solid var(--nero);
    border-radius: 14px;
    background: var(--nero);
    color: #fff;
    font-weight: 900;
    line-height: 1.2;
    text-align: center;
    text-decoration: none;
    box-shadow: 5px 5px 0 var(--blu-vena);
    transition: transform 0.15s ease, background-color 0.15s ease, box-shadow 0.15s ease;
  }

  .home-button:hover {
    background: var(--rosso-arteria);
    box-shadow: 5px 5px 0 var(--nero);
    transform: translateY(-1px);
  }

  .home-button:focus-visible { outline: 4px solid var(--blu-vena); outline-offset: 5px; }

  @media (max-width: 600px){
    main{ padding: 24px 14px 60px; }
    .card{ padding: 22px 18px; box-shadow: 6px 6px 0 var(--rosso-arteria), 6px 6px 0 3px var(--nero); }
    .domanda{ font-size: 21px; }
    .opzione{ font-size: 20px; padding: 12px 14px; }
  }
</style>
</head>

<svg class="splat splat-1" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path fill="#c8102e" d="M100,20c18,0,20,18,34,22c14,4,30-2,38,12c8,14-6,26-2,40c4,14,20,20,18,34c-2,14-20,14-30,24c-10,10-8,28-22,32c-14,4-24-12-38-12c-14,0-26,14-38,8c-12-6-10-24-18-34c-8-10-24-12-26-26c-2-14,14-20,18-34c4-14-10-28,0-40c10-12,28-4,42-10c14-6,18-26,34-26z"/><circle cx="40" cy="160" r="8" fill="#c8102e"/><circle cx="170" cy="40" r="6" fill="#c8102e"/><circle cx="160" cy="170" r="10" fill="#c8102e"/></svg>

<button class="audio-toggle" id="audioToggle" title="Audio on/off">🔊</button>

<main>
  <header>
    <h1><span class="rosso">QUIZ</span> <span class="blu">SPLATTER</span></h1>
    <p class="sottotitolo">Apparato Cardio-Circolatorio</p>
  </header>

  <div class="card" id="card">
    <!-- Schermata iniziale -->
    <div class="start-screen" id="startScreen">
      <p>Ripassa i concetti chiave del <strong>sistema cardiovascolare</strong>: cuore, vasi, sangue e circolazione.</p>
      <p style="margin-bottom: 34px;">10 domande. Rispondi e scopri subito la soluzione corretta.</p>
      <button class="bottone" id="startBtn">▶ Inizia il quiz</button>
    </div>

    <!-- Schermata quiz -->
    <div class="quiz-screen" id="quizScreen" style="display:none;">
      <div class="progress-bar">
        <span class="numero">Domanda <span id="qNum">1</span>/<span id="qTot">10</span></span>
        <span class="punteggio">♥ Punteggio: <span id="score">0</span></span>

      <div class="domanda" id="domanda"></div>

        <button class="bottone blu" id="nextBtn">Prossima ▶</button>
      </div>
    </div>

    <!-- Schermata finale -->
    <div class="finale" id="finaleScreen" style="display:none;">
      <h2 style="font-family:'Archivo Black',sans-serif; font-size:34px; text-transform:uppercase;">Quiz completato!</h2>
      <div class="score-big"><span id="finalScore">0</span>/10</div>
      <p class="msg" id="finalMsg"></p>
      <button class="bottone" id="restartBtn">↻ Ricomincia</button>

  </div>
</main>

<script>
// ============ DOMANDE ============
const domande = [
  {
    q: "Quale camera del cuore riceve il sangue ossigenato proveniente dai polmoni?",
    opzioni: ["Atrio destro", "Ventricolo destro", "Atrio sinistro", "Ventricolo sinistro"],
    corretta: 2,
    spiega: "L'atrio sinistro riceve il sangue ossigenato dai polmoni attraverso le quattro vene polmonari."
  },
  {
    q: "Quale vaso sanguigno trasporta sangue povero di ossigeno dal cuore ai polmoni?",
    opzioni: ["Aorta", "Arteria polmonare", "Vena cava", "Vena polmonare"],
    corretta: 1,
    spiega: "L'arteria polmonare è l'unica arteria che trasporta sangue povero di ossigeno: parte dal ventricolo destro e va ai polmoni."
  },
  {
    q: "Qual è la funzione principale dei globuli rossi (eritrociti)?",
    opzioni: ["Difendere l'organismo dalle infezioni", "Trasportare ossigeno grazie all'emoglobina", "Permettere la coagulazione del sangue", "Produrre anticorpi"],
    corretta: 1,
    spiega: "I globuli rossi contengono emoglobina, una proteina che lega l'ossigeno e lo trasporta ai tessuti."
  },
  {
    q: "Quale valvola separa il ventricolo sinistro dall'aorta?",
    opzioni: ["Valvola mitrale", "Valvola tricuspide", "Valvola polmonare", "Valvola aortica"],
    corretta: 3,
    spiega: "La valvola aortica (semilunare) impedisce al sangue di tornare dal ventricolo sinistro durante la diastole."
  },
  {
    q: "Come si chiama la circolazione che porta il sangue dal cuore ai polmoni e ritorno?",
    opzioni: ["Grande circolazione", "Piccola circolazione (polmonare)", "Circolazione portale", "Circolazione coronarica"],
    corretta: 1,
    spiega: "La piccola circolazione (o polmonare) porta il sangue dal ventricolo destro ai polmoni e ritorna all'atrio sinistro."
  },
  {
    q: "Quale di questi NON è un componente del sangue?",
    opzioni: ["Plasma", "Globuli bianchi", "Piastrine", "Neuroni"],
    corretta: 3,
    spiega: "I neuroni sono cellule del sistema nervoso, non del sangue. Il sangue è composto da plasma, globuli rossi, globuli bianchi e piastrine."
  },
  {
    q: "Qual è il nome dei vasi più piccoli, sede dello scambio gassoso con i tessuti?",
    opzioni: ["Arteriole", "Venule", "Capillari", "Arterie"],
    corretta: 2,
    spiega: "I capillari hanno pareti sottilissime (un solo strato di cellule) che permettono lo scambio di gas e nutrienti con i tessuti."
  },
  {
    q: "Cosa misura la pressione arteriosa sistolica (la 'massima')?",
    opzioni: ["La pressione durante il rilassamento del cuore", "La pressione durante la contrazione del ventricolo", "La pressione nei capillari", "La pressione venosa centrale"],
    corretta: 1,
    spiega: "La sistolica è la pressione massima nelle arterie, registrata durante la contrazione (sistole) dei ventricoli."
  },
  {
    q: "Qual è la differenza principale tra arterie e vene?",
    opzioni: ["Le arterie hanno pareti più sottili", "Le vene hanno valvole e pareti meno muscolose", "Le arterie contengono sempre sangue ossigenato", "Le vene trasportano sempre sangue più velocemente"],
    corretta: 1,
    spiega: "Le vene hanno valvole che impediscono il reflusso e pareti meno spesse; le arterie hanno pareti muscolose ed elastiche per resistere all'alta pressione."
  },
  {
    q: "Quale struttura del cuore funziona come 'pacemaker' naturale?",
    opzioni: ["Nodo atrioventricolare", "Fascio di His", "Nodo seno-atriale", "Fibre del Purkinje"],
    corretta: 2,
    spiega: "Il nodo seno-atriale (SA), situato nell'atrio destro, genera gli impulsi elettrici che regolano il battito cardiaco."
  }
];

// ============ STATO ============
let currentQ = 0;
let score = 0;
let audioOn = true;
let musicStarted = false;

// ============ AUDIO (Web Audio API) ============
let audioCtx = null;
let musicNodes = [];

function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

// Musica di sottofondo: pattern di battito cardiaco ritmato + accordi soft
function startMusic(){
  if(!audioOn || !audioCtx || musicStarted) return;
  musicStarted = true;

  const masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.08;
  masterGain.connect(audioCtx.destination);
  musicNodes.push(masterGain);

  // Battito cardiaco: due pulsazioni ravvicinate ogni ~1.2s
  function heartBeat(time){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 60;
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(0.9, time + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
    osc.connect(gain).connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.2);
  }

  // Accordi ambient (Am - F - C - G progression)
  function playChord(freqs, time, duration){
    freqs.forEach(f => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, time);
      gain.gain.linearRampToValueAtTime(0.15, time + 0.8);
      gain.gain.linearRampToValueAtTime(0, time + duration);
      osc.connect(gain).connect(masterGain);
      osc.start(time);
      osc.stop(time + duration);
    });
  }

  // Schedule loop
  function scheduleLoop(){
    if(!musicStarted) return;
    const now = audioCtx.currentTime;
    const loopDur = 8; // 8 secondi di loop

    // Battiti (2 per secondo circa, a coppie)
    for(let t = 0; t < loopDur; t += 1.1){
      heartBeat(now + t);
      heartBeat(now + t + 0.22);
    }

    // Accordi: Am (A3, C4, E4), F, C, G
    playChord([220, 261.63, 329.63], now,       2);
    playChord([174.61, 220, 261.63], now + 2,   2);
    playChord([130.81, 164.81, 196], now + 4,   2);
    playChord([196, 246.94, 293.66], now + 6,   2);

    setTimeout(scheduleLoop, loopDur * 1000);
  }
  scheduleLoop();
}

function stopMusic(){
  musicStarted = false;
  musicNodes.forEach(n => { try{ n.disconnect(); } catch(e){} });
  musicNodes = [];
}

// Suono di vittoria: arpeggio ascendente brillante
function playWinSound(){
  if(!audioOn || !audioCtx) return;
  const now = audioCtx.currentTime;
  const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
  notes.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = f;
    const t = now + i * 0.09;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.5);
  });

  // Brillantina finale
  const sparkle = audioCtx.createOscillator();
  const sparkleGain = audioCtx.createGain();
  sparkle.type = 'sine';
  sparkle.frequency.setValueAtTime(1568, now + 0.35);
  sparkle.frequency.exponentialRampToValueAtTime(2093, now + 0.55);
  sparkleGain.gain.setValueAtTime(0, now + 0.35);
  sparkleGain.gain.linearRampToValueAtTime(0.2, now + 0.37);
  sparkleGain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
  sparkle.connect(sparkleGain).connect(audioCtx.destination);
  sparkle.start(now + 0.35);
  sparkle.stop(now + 0.7);
}

// Suono risposta sbagliata: buzz basso
function playWrongSound(){
  if(!audioOn || !audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, now);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
  gain.gain.setValueAtTime(0.2, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.3);
}

// ============ LOGICA GIOCO ============
const startScreen = document.getElementById('startScreen');
const quizScreen = document.getElementById('quizScreen');
const finaleScreen = document.getElementById('finaleScreen');
const domandaEl = document.getElementById('domanda');
const opzioniEl = document.getElementById('opzioni');
const feedbackEl = document.getElementById('feedback');
const nextWrapper = document.getElementById('nextWrapper');
const qNumEl = document.getElementById('qNum');
const qTotEl = document.getElementById('qTot');
const scoreEl = document.getElementById('score');
const progressFill = document.getElementById('progressFill');

qTotEl.textContent = domande.length;

document.getElementById('startBtn').addEventListener('click', () => {
  initAudio();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  startMusic();
  startScreen.style.display = 'none';
  quizScreen.style.display = 'block';
  showQuestion();
});

document.getElementById('nextBtn').addEventListener('click', () => {
  currentQ++;
  if(currentQ < domande.length){
    showQuestion();
  } else {
    showFinale();
  }
});

document.getElementById('restartBtn').addEventListener('click', () => {
  currentQ = 0;
  score = 0;
  scoreEl.textContent = 0;
  finaleScreen.style.display = 'none';
  quizScreen.style.display = 'block';
  showQuestion();
});

document.getElementById('audioToggle').addEventListener('click', (e) => {
  audioOn = !audioOn;
  e.currentTarget.textContent = audioOn ? '🔊' : '🔇';
  if(!audioOn){
    stopMusic();
  } else if(audioCtx){
    startMusic();
  }
});

function showQuestion(){
  const d = domande[currentQ];
  qNumEl.textContent = currentQ + 1;
  progressFill.style.width = ((currentQ) / domande.length * 100) + '%';

  domandaEl.textContent = d.q;
  opzioniEl.innerHTML = '';
  feedbackEl.className = 'feedback';
  feedbackEl.innerHTML = '';
  nextWrapper.classList.remove('show');

  d.opzioni.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'opzione';
    btn.textContent = opt;
    btn.addEventListener('click', () => answerQuestion(idx, btn));
    opzioniEl.appendChild(btn);
  });
}

function answerQuestion(selectedIdx, btnEl){
  const d = domande[currentQ];
  const allBtns = opzioniEl.querySelectorAll('.opzione');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = selectedIdx === d.corretta;

  if(isCorrect){
    btnEl.classList.add('corretta');
    score++;
    scoreEl.textContent = score;
    playWinSound();
    triggerSplatterBurst();
    feedbackEl.className = 'feedback giusta show';
    feedbackEl.innerHTML = '<strong>✓ Risposta corretta!</strong>' + d.spiega;
  } else {
    btnEl.classList.add('sbagliata');
    // Evidenzia anche la risposta corretta
    allBtns[d.corretta].classList.add('corretta');
    playWrongSound();
    feedbackEl.className = 'feedback errata show';
    feedbackEl.innerHTML = '<strong>✗ Non è corretta</strong>La risposta esatta è: <em>' + d.opzioni[d.corretta] + '</em>.<br>' + d.spiega;
  }

  progressFill.style.width = ((currentQ + 1) / domande.length * 100) + '%';
  nextWrapper.classList.add('show');

  // Cambia testo del bottone se è l'ultima
  document.getElementById('nextBtn').textContent = (currentQ === domande.length - 1) ? 'Vedi risultato ▶' : 'Prossima ▶';
}

function showFinale(){
  quizScreen.style.display = 'none';
  finaleScreen.style.display = 'block';
  document.getElementById('finalScore').textContent = score;

  let msg;
  const pct = score / domande.length;
  if(pct === 1) msg = "🏆 Perfetto! Conosci il cuore come il palmo della tua mano.";
  else if(pct >= 0.8) msg = "💪 Ottimo risultato! Padroneggi la circolazione.";
  else if(pct >= 0.6) msg = "👍 Buono! Con un po' di ripasso sei al top.";
  else if(pct >= 0.4) msg = "📚 C'è ancora qualcosa da rivedere. Riprova!";
  else msg = "🔁 Dai un'occhiata al materiale e riprova: ce la farai!";

  document.getElementById('finalMsg').textContent = msg;
}

// Effetto splatter quando la risposta è corretta
function triggerSplatterBurst(){
  const colors = ['#c8102e', '#0b3d91', '#7a0a1c', '#c8102e'];
  for(let i = 0; i < 12; i++){
    const drop = document.createElement('div');
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 10 + Math.random() * 30;
    drop.style.cssText = `
      position: fixed;
      left: 50%;
      top: 50%;
      width: ${size}px;
      height: ${size}px;
      background: ${color};
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      transition: transform 1s cubic-bezier(.2,.8,.4,1), opacity 1s ease;
    `;
    document.body.appendChild(drop);

    // Forma irregolare
    drop.style.borderRadius = `${30+Math.random()*70}% ${30+Math.random()*70}% ${30+Math.random()*70}% ${30+Math.random()*70}%`;

    requestAnimationFrame(() => {
      const angle = Math.random() * Math.PI * 2;
      const dist = 150 + Math.random() * 250;
      const x = Math.cos(angle) * dist;
      const y = Math.sin(angle) * dist;
      drop.style.transform = `translate(${x}px, ${y}px) scale(${0.3 + Math.random()})`;
      drop.style.opacity = '0';
    });

    setTimeout(() => drop.remove(), 1100);
  }
}
</script>
